name: Drain Watchdog

# Watches the autonomous /drain-queue loop and auto-heals when STUCK.
# STUCK criteria (any one):
#   - No new commit on master in 7h (more than one missed 6h fire)
#   - Open auto-improvement queue > 40 AND no issue closed in 8h
#   - Latest CI conclusion = failure on autonomous commit
# On STUCK: runs /drain-queue via claude-code-action with the same selector
# logic as the cloud cron routine (skip feat:-titled clusters, cap 2 issues/session).

on:
  schedule:
    - cron: '*/30 * * * *'   # every 30 min
  workflow_dispatch: {}

concurrency:
  group: drain-watchdog
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  id-token: write

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      stuck: ${{ steps.detect.outputs.stuck }}
      reason: ${{ steps.detect.outputs.reason }}
      cluster: ${{ steps.detect.outputs.cluster }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect STUCK
        id: detect
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          NOW_EPOCH=$(date -u +%s)
          LAST_COMMIT_ISO=$(git log -1 --format=%cI origin/master)
          LAST_COMMIT_EPOCH=$(date -u -d "$LAST_COMMIT_ISO" +%s)
          AGE_HOURS=$(( (NOW_EPOCH - LAST_COMMIT_EPOCH) / 3600 ))
          QUEUE_SIZE=$(gh issue list --state open --label auto-improvement --limit 200 --json number --jq 'length')
          CLOSED_LAST_8H=$(gh issue list --state closed --limit 50 --search "closed:>$(date -u -d '8 hours ago' +%Y-%m-%dT%H:%M:%SZ)" --json number --jq 'length')

          echo "## Drain watchdog signals" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- last commit: $LAST_COMMIT_ISO ($AGE_HOURS h ago)" >> "$GITHUB_STEP_SUMMARY"
          echo "- open auto-improvement queue: $QUEUE_SIZE" >> "$GITHUB_STEP_SUMMARY"
          echo "- issues closed in last 8h: $CLOSED_LAST_8H" >> "$GITHUB_STEP_SUMMARY"

          STUCK=false
          REASON=""
          if [ "$AGE_HOURS" -gt 7 ]; then
            STUCK=true
            REASON="no commit on master in ${AGE_HOURS}h (>7h threshold)"
          elif [ "$QUEUE_SIZE" -gt 40 ] && [ "$CLOSED_LAST_8H" -eq 0 ]; then
            STUCK=true
            REASON="queue size $QUEUE_SIZE with 0 closures in last 8h"
          fi

          echo "- STUCK: $STUCK" >> "$GITHUB_STEP_SUMMARY"
          [ -n "$REASON" ] && echo "- reason: $REASON" >> "$GITHUB_STEP_SUMMARY"

          # Pre-compute cluster using same selector as the cloud routine
          # so the heal step can pass it directly to /drain-queue.
          CLUSTER=""
          if [ "$STUCK" = "true" ]; then
            python3 -m pip install -q -r <(grep -E '^(requests|httpx)' requirements.txt 2>/dev/null) >/dev/null 2>&1 || true
            CLUSTER=$(python3 - <<'PY' || echo ""
          import json, subprocess, sys
          sys.path.insert(0, 'plugins/autonomous-dev/lib')
          try:
              from drain_queue_state import AUTO_DRAINABLE_SEVERITY, MAX_CLUSTER_SIZE_AUTO_DRAINABLE
          except Exception as e:
              print("", end="")
              sys.exit(0)
          out = subprocess.run(
              ['python3', 'plugins/autonomous-dev/lib/issue_triage_analyzer.py',
               '--auto-improvement', '--json', '--limit', '50'],
              capture_output=True, text=True
          )
          try:
              clusters = json.loads(out.stdout)
          except Exception:
              print("", end=""); sys.exit(0)

          def is_feat(titles):
              prefixes = ('feat:', 'feat(', 'feature:', 'feature(')
              return any((t or '').lower().lstrip().startswith(prefixes) for t in titles)

          for c in clusters:
              if c['severity'] not in AUTO_DRAINABLE_SEVERITY:
                  continue
              if c['cluster_size'] > MAX_CLUSTER_SIZE_AUTO_DRAINABLE:
                  continue
              if is_feat(c.get('issue_titles', [])):
                  continue
              print(','.join(str(n) for n in c['issue_numbers'][:2]), end="")
              break
          PY
            )
            echo "- selected cluster: ${CLUSTER:-NONE}" >> "$GITHUB_STEP_SUMMARY"
            if [ -z "$CLUSTER" ]; then
              STUCK=false
              REASON="$REASON; but no drainable non-feature cluster exists — nothing to heal"
              echo "- forced STUCK=false: no drainable cluster" >> "$GITHUB_STEP_SUMMARY"
            fi
          fi

          echo "stuck=$STUCK" >> "$GITHUB_OUTPUT"
          echo "reason=$REASON" >> "$GITHUB_OUTPUT"
          echo "cluster=$CLUSTER" >> "$GITHUB_OUTPUT"

      - name: Open watchdog alert issue
        if: steps.detect.outputs.stuck == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "[drain-stuck] watchdog: ${{ steps.detect.outputs.reason }}" \
            --label "drain-stuck,auto-improvement" \
            --body "$(cat <<EOF
          Watchdog run \`${{ github.run_id }}\` at $(date -u +%Y-%m-%dT%H:%M:%SZ) detected STUCK.

          - **Reason**: ${{ steps.detect.outputs.reason }}
          - **Selected cluster for heal**: \`${{ steps.detect.outputs.cluster }}\`
          - **Workflow run**: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

          The auto-heal step below this issue creation will attempt to drain the selected cluster via claude-code-action. If the heal succeeds, this issue should be closed by the resulting commit.
          EOF
          )" || true

  heal:
    needs: check
    # Only attempt auto-heal when STUCK AND a cluster was pre-selected AND the
    # ANTHROPIC_API_KEY secret is set. The job step itself uses
    # continue-on-error so a missing secret or a transient action failure does
    # not turn the whole watchdog workflow red — the alert issue from the
    # check job is the durable signal.
    if: needs.check.outputs.stuck == 'true' && needs.check.outputs.cluster != ''
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - name: Guard — ANTHROPIC_API_KEY required
        env:
          KEY_PRESENT: ${{ secrets.ANTHROPIC_API_KEY != '' }}
        run: |
          if [ "$KEY_PRESENT" != "true" ]; then
            echo "::warning::ANTHROPIC_API_KEY secret not set — auto-heal disabled. Set it under repo Settings → Secrets and variables → Actions to enable claude-code-action drain."
            echo "stuck_no_heal=true" >> "$GITHUB_ENV"
            exit 0
          fi
      - name: Auto-heal via claude-code-action
        if: env.stuck_no_heal != 'true'
        continue-on-error: true
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          model: "claude-opus-4-7"
          mode: "agent"
          allowed_tools: "Bash,Read,Write,Edit,Glob,Grep"
          direct_prompt: |
            You are the drain-watchdog auto-heal session. The autonomous loop has been stuck. Pre-selected cluster: `${{ needs.check.outputs.cluster }}` (comma-separated issue numbers). Reason: ${{ needs.check.outputs.reason }}.

            CONTEXT: You are running in a vanilla GitHub Actions runner. The autonomous-dev plugin and its slash commands (/drain-queue, /implement) are NOT registered — do not try to invoke them. Do the drain manually using Bash/Read/Edit/Write. The repo has been checked out at $GITHUB_WORKSPACE.

            STEPS:

            1. Pre-flight: cd into $GITHUB_WORKSPACE. Verify .claude/.bypass is absent; if present, exit 0 cleanly with a "bypass active" message.

            2. Read each cluster issue with `gh issue view <N> --json title,body`. Understand what each needs.

            3. Implement the fix(es) directly — read relevant source, make the edits, write/extend tests if appropriate. Keep the scope minimal: do exactly what each issue body asks, no more. If you find an issue is ambiguous or requires architectural decisions, post a comment on the issue explaining what's needed and skip it for this run (do NOT close it).

            4. Run the local test suite to verify nothing regressed:
               `pytest tests/unit/lib/test_drain_queue_*.py tests/regression/test_drain_queue_*.py -q` and any tests directly relevant to the files you changed.

            5. Stage + commit the changes. The commit message MUST include a `Closes #N` line for each cluster issue you actually fixed. Example:
               ```
               fix(scope): #1234 — short summary

               Longer explanation.

               Closes #1234
               ```
               If you fixed 2 issues, include both `Closes #N` lines. If you fixed 0 (all were ambiguous), skip the commit and report which issues need human input.

            6. Push: `git push origin HEAD:master`. If the push fails (e.g., non-fast-forward), `git fetch && git rebase origin/master` and retry once. If still failing, report exactly which step blocked.

            7. Verify each cluster issue flipped state with `gh issue view <N> --json state` — they should be CLOSED after the push (GitHub auto-closes on Closes #N to default branch).

            FORBIDDEN:
            - Do NOT touch unrelated files.
            - Do NOT skip tests with @skip or xfail without a written reason.
            - Do NOT commit `.proposal` files, audit drafts, or local scratch.
            - Do NOT push if the test suite regressed.

            FINAL REPORT (one paragraph): cluster pre-selected, which issues were fixed vs. deferred (with reason), commit SHA pushed, issue closures verified, wall-clock duration.
