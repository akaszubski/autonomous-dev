name: Drain Watchdog

# Watches the autonomous /drain-queue loop and auto-heals when STUCK.
# STUCK criteria (any one) — tightened 2026-06-18 after observing repeated
# cloud-session silent fire-failures (75% of cron fires die without commit):
#   - No new commit on master in 2h (single missed 2h cron fire = STUCK)
#   - Open auto-improvement queue > 30 AND no non-watchdog issue closed in 3h
#   - Latest CI conclusion = failure on autonomous commit
# On STUCK: runs /drain-queue via claude-code-action on a fresh runner
# (full pipeline overruns even the 60-min runner budget on hard clusters).

on:
  schedule:
    - cron: '*/30 * * * *'   # every 30 min
  workflow_dispatch:
    inputs:
      force_heal:
        description: 'Bypass STUCK check and force heal cycle (for on-demand drain)'
        type: boolean
        default: false

concurrency:
  group: drain-watchdog
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  id-token: write

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      stuck: ${{ steps.detect.outputs.stuck }}
      reason: ${{ steps.detect.outputs.reason }}
      cluster: ${{ steps.detect.outputs.cluster }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect STUCK
        id: detect
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          NOW_EPOCH=$(date -u +%s)
          LAST_COMMIT_ISO=$(git log -1 --format=%cI origin/master)
          LAST_COMMIT_EPOCH=$(date -u -d "$LAST_COMMIT_ISO" +%s)
          AGE_HOURS=$(( (NOW_EPOCH - LAST_COMMIT_EPOCH) / 3600 ))
          QUEUE_SIZE=$(gh issue list --state open --label auto-improvement --limit 200 --json number --jq 'length')
          # Exclude watchdog-self meta-issues (label drain-stuck) from the closures count —
          # those don't represent real drain progress, just watchdog's own cleanup.
          CLOSED_LAST_3H=$(gh issue list --state closed --limit 50 --search "closed:>$(date -u -d '3 hours ago' +%Y-%m-%dT%H:%M:%SZ) -label:drain-stuck" --json number --jq 'length')

          echo "## Drain watchdog signals" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- last commit: $LAST_COMMIT_ISO ($AGE_HOURS h ago)" >> "$GITHUB_STEP_SUMMARY"
          echo "- open auto-improvement queue: $QUEUE_SIZE" >> "$GITHUB_STEP_SUMMARY"
          echo "- non-meta issues closed in last 3h: $CLOSED_LAST_3H" >> "$GITHUB_STEP_SUMMARY"

          STUCK=false
          REASON=""
          # Force_heal input bypasses STUCK check — for on-demand drain cycles
          # when the loop is otherwise quiet but the operator wants throughput.
          if [ "${{ github.event.inputs.force_heal }}" = "true" ]; then
            STUCK=true
            REASON="force_heal=true (operator-triggered on-demand drain)"
          # Tightened 2026-06-18 after observing cloud-session silent failures.
          # 2h gap = single missed cron fire = STUCK. Catches failures faster
          # than 3h (which let 1.5 fires slip).
          elif [ "$AGE_HOURS" -ge 2 ]; then
            STUCK=true
            REASON="no commit on master in ${AGE_HOURS}h (≥2h threshold — single missed 2h cron fire)"
          elif [ "$QUEUE_SIZE" -gt 30 ] && [ "$CLOSED_LAST_3H" -eq 0 ]; then
            STUCK=true
            REASON="queue size $QUEUE_SIZE with 0 real closures in last 3h (watchdog meta-closures excluded)"
          fi

          echo "- STUCK: $STUCK" >> "$GITHUB_STEP_SUMMARY"
          [ -n "$REASON" ] && echo "- reason: $REASON" >> "$GITHUB_STEP_SUMMARY"

          # Pre-compute cluster using same selector as the cloud routine
          # so the heal step can pass it directly to /drain-queue.
          CLUSTER=""
          if [ "$STUCK" = "true" ]; then
            python3 -m pip install -q -r <(grep -E '^(requests|httpx)' requirements.txt 2>/dev/null) >/dev/null 2>&1 || true
            CLUSTER=$(python3 - <<'PY' || echo ""
          import json, subprocess, sys
          sys.path.insert(0, 'plugins/autonomous-dev/lib')
          try:
              from drain_queue_state import AUTO_DRAINABLE_SEVERITY, MAX_CLUSTER_SIZE_AUTO_DRAINABLE
          except Exception as e:
              print("", end="")
              sys.exit(0)
          out = subprocess.run(
              ['python3', 'plugins/autonomous-dev/lib/issue_triage_analyzer.py',
               '--auto-improvement', '--json', '--limit', '50'],
              capture_output=True, text=True
          )
          try:
              clusters = json.loads(out.stdout)
          except Exception:
              print("", end=""); sys.exit(0)

          def is_large_feat(cluster):
              titles = cluster.get('issue_titles', [])
              prefixes = ('feat:', 'feat(', 'feature:', 'feature(')
              has_feat = any((t or '').lower().lstrip().startswith(prefixes) for t in titles)
              # Small feature clusters (<=2 issues) ARE drainable.
              return has_feat and cluster.get('cluster_size', 0) > 2

          def is_drain_stuck_meta(cluster):
              # Skip the watchdog's own bookkeeping issues — picking them creates
              # a degenerate fixed-point where heal only drains its own filings
              # while the real backlog never moves (#1248/#1242/#1254/#1255/#1256
              # pattern observed 2026-06-18).
              titles = cluster.get('issue_titles', [])
              return any('[drain-stuck]' in (t or '').lower() for t in titles)

          for c in clusters:
              if c['severity'] not in AUTO_DRAINABLE_SEVERITY:
                  continue
              if c['cluster_size'] > MAX_CLUSTER_SIZE_AUTO_DRAINABLE:
                  continue
              if is_large_feat(c):
                  continue
              if is_drain_stuck_meta(c):
                  continue
              # Per-session cap bumped 2026-06-19: 2 → 3 issues per heal cycle
              # to lift throughput. 3 × ~10min --light = ~30min, well under
              # the 60-min runner budget.
              print(','.join(str(n) for n in c['issue_numbers'][:3]), end="")
              break
          PY
            )
            echo "- selected cluster: ${CLUSTER:-NONE}" >> "$GITHUB_STEP_SUMMARY"
            if [ -z "$CLUSTER" ]; then
              STUCK=false
              REASON="$REASON; but no drainable non-feature cluster exists — nothing to heal"
              echo "- forced STUCK=false: no drainable cluster" >> "$GITHUB_STEP_SUMMARY"
            fi
          fi

          echo "stuck=$STUCK" >> "$GITHUB_OUTPUT"
          echo "reason=$REASON" >> "$GITHUB_OUTPUT"
          echo "cluster=$CLUSTER" >> "$GITHUB_OUTPUT"

      - name: Open watchdog alert issue (debounced)
        if: steps.detect.outputs.stuck == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Debounce: skip if any open drain-stuck issue was filed in the
          # last 4h. Prevents the watchdog from polluting the queue with
          # duplicate alerts when STUCK persists across multiple runs.
          RECENT_ALERT=$(gh issue list --state open --label drain-stuck \
            --search "created:>$(date -u -d '4 hours ago' +%Y-%m-%dT%H:%M:%SZ)" \
            --json number --jq 'length')
          if [ "$RECENT_ALERT" -gt 0 ]; then
            echo "::notice::Skipping alert — $RECENT_ALERT open drain-stuck issue(s) in last 4h"
            echo "- alert: SKIPPED (debounce, $RECENT_ALERT existing open)" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          gh issue create \
            --title "[drain-stuck] watchdog: ${{ steps.detect.outputs.reason }}" \
            --label "drain-stuck" \
            --body "$(cat <<EOF
          Watchdog run \`${{ github.run_id }}\` at $(date -u +%Y-%m-%dT%H:%M:%SZ) detected STUCK.

          - **Reason**: ${{ steps.detect.outputs.reason }}
          - **Selected cluster for heal**: \`${{ steps.detect.outputs.cluster }}\`
          - **Workflow run**: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

          The auto-heal step below this issue creation will attempt to drain the selected cluster via claude-code-action. If the heal succeeds, this issue should be closed by the resulting commit.
          EOF
          )" || true

  heal:
    needs: check
    # Only attempt auto-heal when STUCK AND a cluster was pre-selected AND the
    # ANTHROPIC_API_KEY secret is set. The job step itself uses
    # continue-on-error so a missing secret or a transient action failure does
    # not turn the whole watchdog workflow red — the alert issue from the
    # check job is the durable signal.
    if: needs.check.outputs.stuck == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
      # 2026-06-19: added `workflows: write` after force_heal run 27799993605
      # ran the full SDLC on #1252 (autonomous multi-repo deploy fan-out),
      # produced a real commit e4ba8f4 with Closes #1252, but git push was
      # refused: "GitHub App ... without 'workflows' permission" because the
      # commit added .github/workflows/auto-deploy-consumers.yml. Without
      # this permission, any autonomous run whose deliverable touches CI
      # workflows can't self-land.
      actions: write
    steps:
      - uses: actions/checkout@v4
      - name: Install autonomous-dev plugin into runner
        # claude-code reads ~/.claude/{agents,commands,hooks,lib,skills} for
        # slash commands and agents. The plugin source lives under
        # plugins/autonomous-dev/ — sync it to ~/.claude so /implement and
        # /drain-queue resolve as proper slash commands in the runner.
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.claude"
          for subdir in agents commands hooks lib skills config templates scripts; do
            if [ -d "plugins/autonomous-dev/$subdir" ]; then
              echo "  sync $subdir/"
              rsync -a --delete "plugins/autonomous-dev/$subdir/" "$HOME/.claude/$subdir/"
            fi
          done
          # Quality fix (2026-06-19): commit 28f68ec body noted that Sonnet-tier
          # subagents (reviewer, security-auditor, doc-master, CIA) returned 404
          # in the cloud-action runtime — only Opus-tier agents (planner,
          # test-master, implementer) were dispatchable. Result: autonomous
          # commits skipped reviewer/security/docs review. Override all agent
          # frontmatter to model: opus in the runner so the full SDLC runs.
          OVERRIDDEN=0
          for agent_md in "$HOME/.claude/agents"/*.md; do
            [ -f "$agent_md" ] || continue
            if grep -q '^model: sonnet' "$agent_md"; then
              sed -i 's/^model: sonnet/model: opus/' "$agent_md"
              OVERRIDDEN=$((OVERRIDDEN + 1))
            fi
          done
          echo "  Overrode $OVERRIDDEN Sonnet agents → Opus for runner dispatch"
          # Project-level marker so hooks recognize repo identity (#803 self-maint).
          mkdir -p .claude
          [ -f plugins/autonomous-dev/.claude-plugin/marketplace.json ] || true
          echo "Plugin installed. Sample slash commands available:"
          ls "$HOME/.claude/commands" | head -10
      - name: Guard — auth credential required
        env:
          OAUTH_PRESENT: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN != '' }}
          KEY_PRESENT: ${{ secrets.ANTHROPIC_API_KEY != '' }}
        run: |
          if [ "$OAUTH_PRESENT" != "true" ] && [ "$KEY_PRESENT" != "true" ]; then
            echo "::warning::Neither CLAUDE_CODE_OAUTH_TOKEN (Max sub) nor ANTHROPIC_API_KEY secret is set — auto-heal disabled. Set one under repo Settings → Secrets and variables → Actions to enable claude-code-action drain. Run 'claude setup-token' to generate an OAuth token."
            echo "stuck_no_heal=true" >> "$GITHUB_ENV"
            exit 0
          fi
          if [ "$OAUTH_PRESENT" = "true" ]; then
            echo "auth_mode=oauth" >> "$GITHUB_ENV"
            echo "Auth: CLAUDE_CODE_OAUTH_TOKEN (Max subscription)"
          else
            echo "auth_mode=apikey" >> "$GITHUB_ENV"
            echo "Auth: ANTHROPIC_API_KEY (pay-per-use)"
          fi
      - name: Auto-heal via claude-code-action (runs /drain-queue)
        if: env.stuck_no_heal != 'true'
        continue-on-error: true
        uses: anthropics/claude-code-action@beta
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          model: "claude-opus-4-7"
          mode: "agent"
          allowed_tools: "Bash,Read,Write,Edit,Glob,Grep,SlashCommand,Task"
          timeout_minutes: 60
          direct_prompt: |
            You are the drain-watchdog auto-heal session. The autonomous drain loop has been stuck.

            **Reason for stuck**: ${{ needs.check.outputs.reason }}
            **Routine ID**: `trig_017bMGfV3qAJoYvYaaHwBxU9`

            ## Environment

            The autonomous-dev plugin has been installed at `~/.claude/` by the workflow before this step ran. The slash commands `/drain-queue`, `/implement`, `/triage`, etc., are registered. The repo is checked out at `$GITHUB_WORKSPACE`.

            ## Protocol — follow exactly

            1. **Pre-flight**: cd into `$GITHUB_WORKSPACE`. If `.claude/.bypass` exists, exit 0 cleanly with a "bypass active" message. Do NOT proceed.

            2. **Invoke /drain-queue**:
               ```
               /drain-queue
               ```
               /drain-queue runs its own selection (STEP 3), applies all six safety guardrails (budget, circuit-breaker, pause-flag, tag gate, cluster-size, push verification), invokes /implement --issues internally, pushes, and logs to DrainHistory.jsonl. Do NOT invoke /implement directly. Do NOT pass --issues to /drain-queue (it has no such flag). Let the command run end-to-end. The session timeout is 60 min.

            3. **After /drain-queue returns**, report its outcome.

            ## Critical constraints

            - **Do NOT invoke `/implement` directly** — all drain logic routes through `/drain-queue`.
            - Do NOT use `.claude/.bypass` unless `/drain-queue` itself is stuck in a loop on something genuinely outside SDLC scope.
            - Do NOT run `bash scripts/deploy-all.sh` — this runner has no SSH to other machines.
            - Do NOT commit `.proposal`, `audit drafts`, `*.bak`, or other local scratch.

            ## Final report (one paragraph)

            /drain-queue outcome (PASS / STOP-reason / BLOCKED-at-STEP-X), commit SHA pushed (if any), issue closures verified (list), wall-clock duration, any agents that crashed or required retry.
