name: Drain Driver

# Primary continuous drainer — runs /drain-queue on every fire to exercise all six safety guardrails.
# Unlike drain-watchdog (which only fires on STUCK conditions), this is the actual throughput engine.
#
# Substrate rationale: cloud cron (claude.ai) lacks SlashCommand + gh CLI in
# its session sandbox (telemetry confirmed 100% silent failure 06:02Z–20:02Z
# on 2026-06-19). GitHub Actions runner has full Claude Code CLI + gh CLI +
# all tools, and claude-code-action@beta is the proven path (drain-watchdog
# has produced 5 real autonomous closures over 7 days).
#
# Cadence: hourly. /drain-queue averages ~10-15 min, so hourly cadence
# stays well clear of the 60-min runner budget and serializes cleanly via
# concurrency. If yield is good and OAuth quota allows, can tighten to 30 min.

on:
  schedule:
    - cron: '5 * * * *'   # every hour at :05 (offset from drain-watchdog's :00/:30)
  workflow_dispatch:
    inputs:
      cluster_override:
        description: 'Comma-separated issue numbers to drain (overrides auto-select)'
        required: false

concurrency:
  group: drain-driver
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write
  actions: write

jobs:
  select:
    runs-on: ubuntu-latest
    outputs:
      cluster: ${{ steps.pick.outputs.cluster }}
      queue_size: ${{ steps.pick.outputs.queue_size }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Pick drainable cluster
        id: pick
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          # Honor manual override from workflow_dispatch input.
          OVERRIDE="${{ github.event.inputs.cluster_override }}"
          if [ -n "$OVERRIDE" ]; then
            echo "Manual override: $OVERRIDE"
            echo "cluster=$OVERRIDE" >> "$GITHUB_OUTPUT"
            echo "queue_size=manual" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          QUEUE_SIZE=$(gh issue list --state open --label auto-improvement --limit 200 --json number --jq 'length')
          echo "queue_size=$QUEUE_SIZE" >> "$GITHUB_OUTPUT"
          echo "## Drain driver selection" >> "$GITHUB_STEP_SUMMARY"
          echo "- queue size: $QUEUE_SIZE" >> "$GITHUB_STEP_SUMMARY"

          CLUSTER=$(python3 scripts/select_next_drainable_cluster.py || echo "")
          echo "selected cluster: ${CLUSTER:-NONE}"
          echo "cluster=$CLUSTER" >> "$GITHUB_OUTPUT"
          echo "- selected cluster: ${CLUSTER:-NONE}" >> "$GITHUB_STEP_SUMMARY"

  drain:
    needs: select
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
      actions: write
    steps:
      - uses: actions/checkout@v4

      - name: Install autonomous-dev plugin into runner
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.claude"
          for subdir in agents commands hooks lib skills config templates scripts; do
            if [ -d "plugins/autonomous-dev/$subdir" ]; then
              rsync -a --delete "plugins/autonomous-dev/$subdir/" "$HOME/.claude/$subdir/"
            fi
          done
          # Override Sonnet → Opus in runner (claude-code-action 404s on Sonnet subagents).
          OVERRIDDEN=0
          for agent_md in "$HOME/.claude/agents"/*.md; do
            [ -f "$agent_md" ] || continue
            if grep -q '^model: sonnet' "$agent_md"; then
              sed -i 's/^model: sonnet/model: opus/' "$agent_md"
              OVERRIDDEN=$((OVERRIDDEN + 1))
            fi
          done
          echo "Overrode $OVERRIDDEN Sonnet → Opus"
          mkdir -p .claude

      - name: Guard — auth credential required
        env:
          OAUTH_PRESENT: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN != '' }}
          KEY_PRESENT: ${{ secrets.ANTHROPIC_API_KEY != '' }}
        run: |
          if [ "$OAUTH_PRESENT" != "true" ] && [ "$KEY_PRESENT" != "true" ]; then
            echo "::warning::Neither CLAUDE_CODE_OAUTH_TOKEN nor ANTHROPIC_API_KEY set — drain disabled"
            exit 1
          fi

      - name: Drain via /drain-queue
        continue-on-error: true
        uses: anthropics/claude-code-action@beta
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          model: "claude-opus-4-7"
          mode: "agent"
          allowed_tools: "Bash,Read,Write,Edit,Glob,Grep,SlashCommand,Task"
          timeout_minutes: 50
          direct_prompt: |
            You are the drain-driver continuous-drain session.

            **Queue size at fire**: ${{ needs.select.outputs.queue_size }}

            ## Protocol

            1. **Pre-flight**: cd into `$GITHUB_WORKSPACE`. If `.claude/.bypass` exists, exit 0 cleanly. Do NOT proceed.

            2. **Invoke /drain-queue**:
               ```
               /drain-queue
               ```
               /drain-queue runs its own selection (STEP 3), applies all six safety guardrails, invokes /implement --issues internally, pushes, and logs to DrainHistory.jsonl. Do NOT invoke /implement directly. Do NOT pass --issues to /drain-queue (it has no such flag). Let the command run end-to-end. The session timeout is 50 min.

            3. **After /drain-queue returns**, report its outcome (PASS / STOP reason / BLOCKED-at-step).

            ## Constraints

            - **Do NOT invoke `/implement` directly** — all drain logic routes through `/drain-queue`.
            - Do NOT use `.claude/.bypass`.
            - Do NOT run `bash scripts/deploy-all.sh` (no SSH from runner).
            - Do NOT commit local scratch (`.proposal`, `*.bak`, audit drafts).

            ## Final report (one paragraph)

            /drain-queue outcome: PASS / STOP-reason / BLOCKED-at-STEP-X. Commit SHA pushed (if any). Issue closures verified. Wall-clock duration. Any agent crashes or retries.
