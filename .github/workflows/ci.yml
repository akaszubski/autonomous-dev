name: CI

# Continuous Integration - runs on every push and PR
# Ensures code quality and catches regressions before merge

on:
  push:
    branches: [master, main]
    paths-ignore:
      # Telemetry-only commits don't change tested code — skip CI to avoid
      # noise from cloud-drain FIRE_START/FIRE_END pushes every ~2h.
      - '.claude/logs/cloud-runs.jsonl'
      - '.claude/logs/**'
  pull_request:
    branches: [master, main]
  workflow_dispatch:

# Defer-not-cancel: if a CI run is already in progress for this branch,
# new pushes queue up rather than kill the running job. Matches the
# user-stated intent "if something is running we don't run again".
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Stage 1: Fast smoke tests (fail fast)
  smoke:
    name: Smoke Tests
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'plugins/autonomous-dev/requirements-dev.txt'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pyyaml anthropic

      - name: Validate test categorization
        run: |
          echo "Validating test categorization..."
          python scripts/validate_test_categorization.py --report

      - name: Validate hook sidecar consistency
        run: |
          echo "Validating hook registration consistency..."
          pip install jsonschema -q
          python scripts/generate_hook_config.py --check \
            --hooks-dir plugins/autonomous-dev/hooks \
            --manifest-path plugins/autonomous-dev/config/install_manifest.json \
            --settings-path plugins/autonomous-dev/config/global_settings_template.json \
            --schema-path plugins/autonomous-dev/config/hook-metadata.schema.json

      - name: Run smoke tests
        run: |
          echo "Running smoke tests (fast sanity check)..."
          python -m pytest tests/regression/smoke/ -v --tb=short -o "addopts="

      - name: Validate manifest-doc alignment
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          echo "Validating documentation matches install_manifest.json..."
          if [ -n "$OPENROUTER_API_KEY" ]; then
            echo "Using GenAI validation via OpenRouter (Gemini Flash)"
            pip install openai -q
            python -c "from plugins.autonomous_dev.lib.hybrid_validator import validate_manifest_alignment; import sys; result = validate_manifest_alignment('.'); sys.exit(result.get_exit_code())"
          else
            echo "Skipping manifest-doc alignment (no OPENROUTER_API_KEY secret set)."
            echo "Fallback regex validator was removed 2026-03-20 (commit 494a378)."
            echo "To enable: add OPENROUTER_API_KEY repo secret. Skip is intentional, not a failure."
          fi

  # Stage 1.5: GenAI intent validation (semantic, drift-proof)
  #
  # Job-level if can reference vars.* but NOT secrets.* (GitHub Actions rule —
  # secrets are only resolvable in step env, not in job-level conditionals).
  # Enable by setting repo VARIABLE OPENROUTER_API_KEY=true under
  # Settings → Secrets and variables → Actions → Variables.
  genai-validation:
    name: GenAI Intent Tests
    runs-on: ubuntu-latest
    needs: smoke
    if: ${{ vars.OPENROUTER_API_KEY != '' }}
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'plugins/autonomous-dev/requirements-dev.txt'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest openai pyyaml

      - name: Run GenAI intent tests
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GENAI_TESTS: 'true'
        run: |
          echo "Running GenAI intent validation tests..."
          python -m pytest tests/genai/ -v --tb=short -o "addopts="

  # Stage 2: Full test suite (only if smoke passes)
  test:
    name: Full Test Suite
    runs-on: ubuntu-latest
    needs: smoke
    # 15-min timeout was too tight — unit+integration+regression suites
    # take ~25-40 min. Job has been silently timing-out → "cancelled"
    # status for months. Bumped to 60 min so runs actually complete.
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'plugins/autonomous-dev/requirements-dev.txt'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov pyyaml

      - name: Run unit tests
        run: |
          echo "Running unit tests..."
          python -m pytest tests/unit/ -v --tb=short -o "addopts=" --ignore=tests/archived/

      - name: Run integration tests
        run: |
          echo "Running integration tests..."
          python -m pytest tests/integration/ -v --tb=short -o "addopts=" --ignore=tests/archived/

      - name: Run regression tests
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          echo "Running regression tests..."
          python -m pytest tests/regression/ -v --tb=short -o "addopts=" --ignore=tests/archived/

  # Stage 3: Summary
  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [smoke, genai-validation, test]
    if: always()

    steps:
      - name: Check results
        env:
          SMOKE_RESULT: ${{ needs.smoke.result }}
          TEST_RESULT: ${{ needs.test.result }}
        run: |
          if [ "$SMOKE_RESULT" = "failure" ]; then
            echo "Smoke tests failed - blocking merge"
            exit 1
          fi
          if [ "$TEST_RESULT" = "failure" ]; then
            echo "Test suite failed - blocking merge"
            exit 1
          fi
          echo "All CI checks passed!"
